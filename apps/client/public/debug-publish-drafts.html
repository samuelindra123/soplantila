<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug: Publish Draft Posts</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        button {
            background: #0070f3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #0051cc;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Debug: Publish Draft Posts</h1>
        <p>
            This tool will find all your DRAFT posts and queue them for processing.
            After processing, they will appear in your feed.
        </p>
        <p>
            <strong>Current Status:</strong> 2 posts are stuck in DRAFT status.
        </p>
        
        <button id="publishBtn" onclick="publishDrafts()">
            🚀 Publish Draft Posts
        </button>

        <div id="result"></div>
    </div>

    <script>
        async function publishDrafts() {
            const btn = document.getElementById('publishBtn');
            const resultDiv = document.getElementById('result');
            
            // Get access token from localStorage
            const accessToken = localStorage.getItem('accessToken');
            
            if (!accessToken) {
                resultDiv.className = 'error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '❌ <strong>Error:</strong> No access token found. Please login first.';
                return;
            }

            // Disable button and show loading
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';
            resultDiv.className = 'info';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Sending request to server...';

            try {
                const response = await fetch('http://localhost:3001/api/posts/debug/publish-drafts', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        ✅ <strong>Success!</strong><br>
                        ${data.message}<br><br>
                        <pre>${JSON.stringify(data.data, null, 2)}</pre>
                        <br>
                        <strong>Next steps:</strong><br>
                        1. Check backend logs for processing status<br>
                        2. Wait 2-5 seconds<br>
                        3. <a href="/feed">Refresh your feed</a>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `
                        ❌ <strong>Error:</strong><br>
                        ${data.message || 'Unknown error'}<br><br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    ❌ <strong>Network Error:</strong><br>
                    ${error.message}<br><br>
                    Make sure backend server is running on http://localhost:3001
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Publish Draft Posts';
            }
        }
    </script>
</body>
</html>
